name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '9.3.1'
        cache-disabled: true
      
    - name: Decode Keystore
      env:
        ENCODED_STRING: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ ! -z "$ENCODED_STRING" ]; then
          echo "$ENCODED_STRING" | base64 --decode > my-upload-key.jks || echo "$ENCODED_STRING" | base64 -d > my-upload-key.jks
        else
          echo "Keystore not provided"
        fi

    - name: Build Release APK
      env:
        KEYSTORE_PATH: my-upload-key.jks
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      run: |
        sudo apt-get update && sudo apt-get install -y xvfb
        xvfb-run -a gradle clean assembleRelease --no-daemon --no-configuration-cache -Dorg.gradle.jvmargs="-Xmx4g" -Pksp.incremental=false -Pksp.allow.all.target.apis=true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release.apk
